<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#111111"/>
  <!-- Outer coin ring -->
  <circle cx="16" cy="16" r="10.5" stroke="#a3e635" stroke-width="1.5"/>
  <!-- Inner coin ring -->
  <circle cx="16" cy="16" r="7.5" stroke="#a3e635" stroke-width="1" stroke-opacity="0.35"/>
  <!-- RM crossbar — two horizontal lines with a vertical stem (stylised R) -->
  <!-- Vertical stem -->
  <line x1="13" y1="11" x2="13" y2="21" stroke="#a3e635" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Top crossbar -->
  <path d="M13 11 Q18 11 18 13.5 Q18 16 13 16" stroke="#a3e635" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Leg of R -->
  <line x1="14" y1="16" x2="18.5" y2="21" stroke="#a3e635" stroke-width="1.6" stroke-linecap="round"/>
</svg>
